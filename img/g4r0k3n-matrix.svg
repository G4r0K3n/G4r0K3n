<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }

      /* Matrix rain characters */
      .rain { font-family: 'Courier New', monospace; font-size: 13px; fill: #003300; }
      .rain-bright { fill: #00FF41; }

      /* Main letters */
      .letter {
        font-family: 'Courier New', monospace;
        font-size: 72px;
        font-weight: bold;
        fill: #00FF41;
        filter: url(#glow);
      }

      /* Scanline overlay */
      .scanline {
        fill: none;
        stroke: #00FF41;
        stroke-width: 0.3;
        opacity: 0.04;
      }
    </style>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="clip">
      <rect width="900" height="120"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="120"/>

  <!-- Matrix rain columns (background) -->
  <g clip-path="url(#clip)" opacity="0.35">

    <!-- Column 1 -->
    <text class="rain" x="15" y="10">1</text>
    <text class="rain" x="15" y="22">0</text>
    <text class="rain" x="15" y="34">1</text>
    <text class="rain rain-bright" x="15" y="46">0</text>
    <text class="rain" x="15" y="58">ア</text>
    <text class="rain" x="15" y="70">1</text>
    <text class="rain" x="15" y="82">0</text>
    <text class="rain" x="15" y="94">ウ</text>
    <text class="rain" x="15" y="106">1</text>
    <animate attributeName="opacity" values="0.35;0.15;0.35" dur="3.1s" repeatCount="indefinite"/>

    <!-- Column 2 -->
    <text class="rain" x="35" y="18">ア</text>
    <text class="rain rain-bright" x="35" y="30">1</text>
    <text class="rain" x="35" y="42">0</text>
    <text class="rain" x="35" y="54">エ</text>
    <text class="rain" x="35" y="66">1</text>
    <text class="rain" x="35" y="78">ウ</text>
    <text class="rain" x="35" y="90">0</text>
    <text class="rain" x="35" y="102">1</text>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2.4s" repeatCount="indefinite"/>

    <!-- Column 3 -->
    <text class="rain" x="855" y="12">0</text>
    <text class="rain" x="855" y="24">イ</text>
    <text class="rain rain-bright" x="855" y="36">1</text>
    <text class="rain" x="855" y="48">0</text>
    <text class="rain" x="855" y="60">ア</text>
    <text class="rain" x="855" y="72">1</text>
    <text class="rain" x="855" y="84">エ</text>
    <text class="rain" x="855" y="96">0</text>
    <text class="rain" x="855" y="108">1</text>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2.8s" repeatCount="indefinite"/>

    <!-- Column 4 -->
    <text class="rain" x="875" y="20">1</text>
    <text class="rain" x="875" y="32">ウ</text>
    <text class="rain rain-bright" x="875" y="44">0</text>
    <text class="rain" x="875" y="56">1</text>
    <text class="rain" x="875" y="68">ア</text>
    <text class="rain" x="875" y="80">0</text>
    <text class="rain" x="875" y="92">イ</text>
    <text class="rain" x="875" y="104">1</text>
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <!-- Scanlines -->
  <g clip-path="url(#clip)">
    <line class="scanline" x1="0" y1="20" x2="900" y2="20"/>
    <line class="scanline" x1="0" y1="40" x2="900" y2="40"/>
    <line class="scanline" x1="0" y1="60" x2="900" y2="60"/>
    <line class="scanline" x1="0" y1="80" x2="900" y2="80"/>
    <line class="scanline" x1="0" y1="100" x2="900" y2="100"/>
  </g>

  <!-- Shadow/glow behind text -->
  <text font-family="'Courier New', monospace" font-size="72" font-weight="bold"
        fill="#00FF41" opacity="0.08" filter="url(#glow-strong)"
        x="450" y="88" text-anchor="middle">G4r0k3n</text>

  <!-- Main animated text -->
  <text class="letter" x="450" y="88" text-anchor="middle" filter="url(#glow)">
    G4r0k3n
    <animate attributeName="opacity" values="1;0.7;1;0.85;1;0.6;1" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch layer 1 -->
  <text font-family="'Courier New', monospace" font-size="72" font-weight="bold"
        fill="#00FF41" x="450" y="88" text-anchor="middle" opacity="0">
    G4r0k3n
    <animate attributeName="opacity" values="0;0;0.6;0;0;0;0.4;0;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;453;447;450;450;452;450" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#00FF41;#00FF41;#ffffff;#00FF41;#00FF41;#00ccff;#00FF41" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch layer 2 (red offset) -->
  <text font-family="'Courier New', monospace" font-size="72" font-weight="bold"
        fill="#ff0033" x="450" y="88" text-anchor="middle" opacity="0">
    G4r0k3n
    <animate attributeName="opacity" values="0;0;0;0.3;0;0;0;0.2;0" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;450;450;456;450;450;450;448;450" dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- Cursor blink -->
  <rect x="762" y="30" width="8" height="52" fill="#00FF41" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom green line -->
  <rect x="100" y="108" width="700" height="1.5" fill="#00FF41" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets -->
  <text font-family="'Courier New', monospace" font-size="18" fill="#00FF41" opacity="0.5" x="60" y="88">▸</text>
  <text font-family="'Courier New', monospace" font-size="18" fill="#00FF41" opacity="0.5" x="822" y="88">◂</text>

</svg>
